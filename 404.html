        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%}

        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.45;pointer-events:none}

        @keyframes float{
            0%,100%{transform:translate(0,0) scale(1)}

        .container{position:relative;z-index:2;max-width:680px;width:100%}

        .code{
            font-size:clamp(96px,18vw,200px);
            font-weight:800;
            line-height:1;

            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            letter-spacing:-.04em;
            margin-bottom:8px;
        }
        h1{
            font-size:clamp(22px,3.4vw,34px);
            font-weight:700;
            margin-bottom:14px;
            color:#fff;
            letter-spacing:-.01em;
        }
        p{
            font-size:clamp(14px,1.6vw,17px);

            line-height:1.6;
            max-width:520px;
            margin:0 auto 36px;
        }
        .actions{
            display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:48px;
        }
        .btn{
            display:inline-flex;align-items:center;gap:8px;
            padding:13px 26px;border-radius:12px;
            font-weight:600;font-size:15px;
            text-decoration:none;transition:transform .2s,box-shadow .2s,background .2s;
            border:1px solid transparent;
        }
        .btn-primary{
            background:linear-gradient(135deg,#3b82f6,#7c3aed);
            color:#fff;
            box-shadow:0 10px 30px -10px rgba(124,58,237,.55);
        }
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 36px -8px rgba(124,58,237,.7)}
        .btn-ghost{
            background:rgba(255,255,255,.04);
            color:#e7e9ee;
            border-color:rgba(255,255,255,.12);
        }
        .btn-ghost:hover{background:rgba(255,255,255,.08);transform:translateY(-2px)}
        .links{
            display:flex;flex-wrap:wrap;gap:10px 22px;justify-content:center;
            padding-top:28px;border-top:1px solid rgba(255,255,255,.07);
        }
        .links span{font-size:13px;color:#7d818f;width:100%;margin-bottom:4px}
        .links a{
            color:#9ca3af;font-size:14px;text-decoration:none;
            transition:color .2s;
        }
        .links a:hover{color:#fff}
        @media(max-width:480px){
            .actions{flex-direction:column;align-items:stretch}
            .btn{justify-content:center}
        }
